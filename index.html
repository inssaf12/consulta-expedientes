<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento Seguro</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%);
            color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }
        header { text-align: center; margin-bottom: 30px; width: 100%; }
        .logo-img { height: 150px; filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.4)); margin-bottom: 10px; }
        .glass-card { 
            background-color: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 25px; width: 100%; max-width: 380px; margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px; border-radius: 15px; color: white; text-align: center; font-size: 18px; margin-bottom: 15px; text-transform: uppercase; outline: none;
        }
        input:focus { border-color: #60a5fa; }
        button {
            width: 100%; background-color: #ffffff; color: #000000; padding: 18px; 
            border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background-color: #e2e8f0; }
        #resultBox { width: 100%; max-width: 380px; display: none; }
        .doc-row { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .bg-ok { background: #ffffff; color: #000; }
        .bg-no { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 9999; display: flex; align-items: center; gap: 8px; font-size: 12px;}
        .section-title { text-align: center; font-size: 12px; font-weight: 900; color: #94a3b8; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <a href="https://wa.me/34621188515" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> CONTACTAR OFICINA</a>

    <header>
        <img src="https://i.ibb.co/6R0yYfM/Logo.png" alt="Lexilias" class="logo-img">
        <p style="color: #60a5fa; letter-spacing: 3px; font-size: 10px; font-weight: bold; text-transform: uppercase;">Servicio jurídico Extranjería</p>
    </header>

    <div class="glass-card">
        <input type="text" id="userExp" placeholder="Nº DE EXPEDIENTE">
        <input type="text" id="userPass" placeholder="Nº DE PASAPORTE">
        <button id="btnSearch" onclick="buscar()">CONSULTAR ESTADO</button>
    </div>

    <div id="resultBox">
        <div id="captureArea">
            <div class="glass-card" style="text-align: center;">
                <span style="font-size: 9px; color: #60a5fa; font-weight: 900; letter-spacing: 1px;">EXPEDIENTE LOCALIZADO</span>
                <h2 id="cName" style="font-style: italic; font-size: 24px; margin: 10px 0; font-weight: 900;"></h2>
                <p id="cExp" style="color: #94a3b8; font-size: 11px; font-weight: bold;"></p>
            </div>

            <div class="glass-card">
                <p class="section-title">ESTADO DEL TRÁMITE</p>
                <div id="docsContent"></div>
            </div>

            <div id="notesCard" class="glass-card" style="display:none; background:rgba(96,165,250,0.05) !important;">
                <p class="section-title" style="color:#60a5fa;">NOTAS IMPORTANTES</p>
                <p id="cNotes" style="text-align:center; font-size:14px; color: #cbd5e1; line-height: 1.6; font-style: italic;"></p>
            </div>
        </div>
        
        <button id="btnPDF" onclick="generarPDF()" style="background:#2563eb; color:white; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <i class="fas fa-file-pdf"></i> DESCARGAR JUSTIFICANTE
        </button>
    </div>

    <script>
        function buscar() {
            const btn = document.getElementById('btnSearch');
            const expVal = document.getElementById('userExp').value.trim().toUpperCase();
            const passVal = document.getElementById('userPass').value.trim().toUpperCase();

            if(!expVal || !passVal) {
                alert("Por favor, introduce el número de expediente y pasaporte.");
                return;
            }

            btn.innerText = "CONECTANDO CON BASE DE DATOS...";
            btn.disabled = true;

            // LLAMADA INTERNA DE GOOGLE (Evita el Error de Conexión)
            google.script.run
                .withSuccessHandler(function(data) {
                    const item = data.find(i => 
                        String(i.n_exp).toUpperCase() === expVal && 
                        String(i.num_pasaporte).toUpperCase() === passVal
                    );

                    if(item) {
                        mostrarResultado(item);
                        // Efecto fiesta si está Tramitado
                        if(String(item.estado_ap).toUpperCase().includes("TRAMITADO")) {
                            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                        }
                    } else {
                        alert("No coinciden los datos. Por favor, verifícalos.");
                    }
                    btn.innerText = "CONSULTAR ESTADO";
                    btn.disabled = false;
                })
                .withFailureHandler(function(err) {
                    alert("Error en el servidor de Google: " + err);
                    btn.innerText = "CONSULTAR ESTADO";
                    btn.disabled = false;
                })
                .getData(); // Esta función debe existir en tu Código.gs
        }

        function mostrarResultado(item) {
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('cName').innerText = item.nombre;
            document.getElementById('cExp').innerText = "REG: " + item.n_exp + " | PAS: " + item.num_pasaporte;
            
            const docs = [
                {n: "PASAPORTE", v: item.pasaporte_esc},
                {n: "CONTRATOS", v: item.contratos},
                {n: "PAGO DE TASAS", v: item.pagado_ap},
                {n: "ESTADO ACTUAL", v: item.estado_ap}
            ];

            document.getElementById('docsContent').innerHTML = docs.map(d => {
                const val = String(d.v || "PENDIENTE").toUpperCase();
                const ok = ["SI", "OK", "PAGADO", "ESCANEADO", "TIENE", "TRAMITADO", "RECIBIDO"].includes(val);
                return `
                <div class="doc-row">
                    <div class="status-badge ${ok ? 'bg-ok' : 'bg-no'}">
                        <i class="fas ${ok ? 'fa-check' : 'fa-times'}"></i>
                    </div>
                    <div>
                        <p style="font-size:8px; color:#94a3b8; font-weight:900; margin:0; text-transform: uppercase;">${d.n}</p>
                        <p style="font-weight:900; font-size: 14px; margin:0; color: ${ok ? '#fff' : '#f87171'}">${val}</p>
                    </div>
                </div>`;
            }).join('');

            if(item.notas && item.notas.trim() !== "") {
                document.getElementById('notesCard').style.display = 'block';
                document.getElementById('cNotes').innerText = item.notas;
            } else {
                document.getElementById('notesCard').style.display = 'none';
            }
            
            window.scrollTo({ top: document.getElementById('resultBox').offsetTop - 20, behavior: 'smooth' });
        }

        function generarPDF() {
            const element = document.getElementById('captureArea');
            const btn = document.getElementById('btnPDF');
            btn.style.display = 'none';
            
            const opt = {
                margin: 10,
                filename: 'Justificante_Lexilias.pdf',
                html2canvas: { scale: 2, backgroundColor: '#020617' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.style.display = 'flex';
            });
        }
    </script>
</body>
</html>
