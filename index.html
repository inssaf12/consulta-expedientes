<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexilias Jurídicos | Estado de Expediente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .bg-lexilias-dark { background-color: #000000; }
        .border-gold { border-color: #d4af37; } /* Un toque dorado sutil para elegancia */

        @keyframes pulse-red-neon {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); transform: scale(1); }
        }
        .incident-active { animation: pulse-red-neon 2s infinite; background-color: #ef4444 !important; border-color: #f87171 !important; }

        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #25d366; color: white;
            padding: 15px 25px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            z-index: 1000; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            font-weight: 900; font-size: 14px; transition: 0.3s;
        }
        .whatsapp-float:hover { transform: translateY(-5px); filter: brightness(1.1); }
    </style>
</head>
<body class="min-h-screen">

    <a href="https://wa.me/34621188515" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp text-2xl"></i>
        <span>CONTACTAR LETRADO</span>
    </a>

    <header class="bg-lexilias-dark py-10 px-4 text-center shadow-2xl">
        <img src="Logo.png" alt="Lexilias" class="h-28 mx-auto mb-4 drop-shadow-2xl">
        <div class="h-1 w-20 bg-white mx-auto rounded-full mb-2"></div>
        <p class="text-white text-[10px] tracking-[0.5em] font-light uppercase opacity-70">Excelencia en Gestión Jurídica</p>
    </header>

    <div class="max-w-md mx-auto px-6 -mt-10 pb-20">
        
        <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl border border-slate-100">
            <div class="text-center mb-6">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Área de Clientes</span>
                <h2 class="text-xl font-black text-slate-800 tracking-tight">CONSULTA TU ESTADO</h2>
            </div>
            <div class="relative mb-4">
                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                <input type="text" id="userInput" placeholder="EXP-000 O PASAPORTE" 
                    class="w-full pl-14 pr-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black text-slate-700 text-lg uppercase outline-none focus:border-black transition-all">
            </div>
            <button onclick="buscarExpediente()" class="w-full bg-lexilias-dark text-white font-black py-5 rounded-3xl shadow-xl hover:bg-slate-800 transition-all active:scale-95">
                BUSCAR EXPEDIENTE
            </button>
        </div>

        <div id="resultBox" class="hidden mt-10 space-y-8">
            
            <div class="bg-lexilias-dark p-8 rounded-[3rem] shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Titular del Expediente</span>
                    <h3 id="clientName" class="text-3xl font-black text-white uppercase italic leading-none mt-2"></h3>
                    <p id="expDetail" class="text-blue-400 text-xs font-bold mt-4 tracking-tighter"></p>
                </div>
                <i class="fas fa-balance-scale absolute -bottom-8 -right-8 text-[12rem] text-white opacity-5"></i>
            </div>

            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fas fa-shield-check text-lexilias-dark text-xl"></i>
                    <h4 class="font-black text-slate-800 text-xs uppercase tracking-widest">Documentación y Tasas</h4>
                </div>
                <div id="docList" class="space-y-6"></div>
            </div>

            <div id="apCard" class="bg-white p-8 rounded-[3rem] shadow-xl border-2 transition-all duration-700">
                <div class="flex items-center gap-3 mb-10">
                    <i class="fas fa-gavel text-lexilias-dark text-xl"></i>
                    <h4 class="font-black text-slate-800 text-xs uppercase tracking-widest">Seguimiento de Antecedentes</h4>
                </div>
                <div id="timelineAP" class="space-y-10 relative before:absolute before:left-[19px] before:top-2 before:bottom-2 before:w-1 before:bg-slate-100">
                    </div>
            </div>

            <div class="bg-slate-900 p-8 rounded-[3rem] shadow-xl relative text-white">
                <i class="fas fa-quote-right absolute top-6 right-8 text-4xl opacity-20"></i>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Notas del Letrado</p>
                <div id="notasText" class="text-sm italic leading-relaxed font-light text-slate-200"></div>
            </div>
        </div>
    </div>

    <script>
        const MI_API_URL = "https://script.google.com/macros/s/AKfycbzS7dC1uPDbpI1e2HUVVTlrb5FxHpqXzZmKRGwMiQBHWgeluJ3AkOgSb2MuIB-FQkQ/exec";
        const PASOS_AP = ["NO TIENE", "LO HA TRAIDO EL", "INCIDENCIA", "RECIBIDO", "TRAMITADO"];

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;
            try {
                const response = await fetch(MI_API_URL);
                const data = await response.json();
                const item = data.find(i => String(i.n_exp).trim().toUpperCase() === val || String(i.pasaporte).trim().toUpperCase() === val);
                if (item) { renderizar(item); } else { alert("Expediente no encontrado."); }
            } catch (e) { alert("Error de servidor."); }
        }

        function renderizar(item) {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('clientName').innerText = item.nombre;
            document.getElementById('expDetail').innerText = "EXP: " + item.n_exp;
            document.getElementById('notasText').innerHTML = item.notas || "Su proceso se encuentra bajo revisión jurídica estándar.";

            const docs = [
                { t: "Pasaporte", v: item.pasaporte, ok: String(item.pasaporte).trim().toUpperCase() === "ESCANEADO" },
                { t: "Contrato Laboral", v: item.contratos, ok: String(item.contratos).trim().toUpperCase() === "TIENE" },
                { t: "Tasas AP", v: item.pagado_ap, ok: String(item.pagado_ap).trim().toUpperCase() === "PAGADO" }
            ];

            document.getElementById('docList').innerHTML = docs.map(d => `
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 rounded-2xl flex items-center justify-center border-2 ${d.ok ? 'bg-green-500 border-green-500 text-white shadow-lg shadow-green-100' : 'bg-red-50 border-red-100 text-red-500'}">
                        <i class="fas ${d.ok ? 'fa-check' : 'fa-xmark'}"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">${d.t}</p>
                        <p class="text-sm font-black ${d.ok ? 'text-green-700' : 'text-red-600'} uppercase">${d.v}</p>
                    </div>
                </div>
            `).join('');

            const estadoActual = String(item.estado_ap).trim().toUpperCase();
            const indexActual = PASOS_AP.indexOf(estadoActual);
            const apCard = document.getElementById('apCard');

            if (estadoActual === "INCIDENCIA") {
                apCard.classList.add('border-red-500', 'bg-red-50');
            } else {
                apCard.classList.remove('border-red-500', 'bg-red-50');
                apCard.classList.add('border-slate-100');
            }

            document.getElementById('timelineAP').innerHTML = PASOS_AP.map((paso, i) => {
                const esPasado = i < indexActual;
                const esActual = i === indexActual;
                const esIncidencia = paso === "INCIDENCIA" && esActual;

                let color = "bg-slate-200 text-white";
                if (esPasado) color = "bg-green-500 text-white shadow-lg shadow-green-100";
                if (esActual) color = "bg-black text-white shadow-xl scale-110";
                if (esIncidencia) color = "incident-active text-white";

                return `
                    <div class="flex items-center gap-6 relative">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center z-10 border-4 border-white ${color} transition-all duration-500">
                            <i class="fas ${esIncidencia ? 'fa-triangle-exclamation' : (esPasado || esActual ? 'fa-check' : 'fa-circle')} text-[12px]"></i>
                        </div>
                        <span class="text-[11px] font-black uppercase tracking-tight ${esIncidencia ? 'text-red-600' : (esActual ? 'text-black' : 'text-slate-300')}">${paso}</span>
                    </div>
                `;
            }).join('');
            
            window.scrollTo({ top: document.getElementById('resultBox').offsetTop - 30, behavior: 'smooth' });
        }
    </script>
</body>
</html>
