<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexilias Jurídicos | Seguimiento</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%);
            color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            padding: 30px; width: 100%; max-width: 420px; margin-bottom: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Botón WhatsApp Flotante */
        .whatsapp-btn {
            position: fixed; bottom: 30px; right: 30px;
            background-color: #25d366; color: white; width: 65px; height: 65px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 35px; box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3); z-index: 1000;
            text-decoration: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .whatsapp-btn:hover { transform: scale(1.15) rotate(10deg); }

        /* Estilos de Filas de Estado */
        .status-row { 
            display: flex; align-items: center; gap: 15px; padding: 18px; 
            background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 12px;
            border-left: 8px solid #444; transition: 0.3s;
        }
        .border-red { border-left-color: #ef4444 !important; }
        .border-green { border-left-color: #22c55e !important; }
        .bg-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .bg-green { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

        .nota-alerta {
            background: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444;
            padding: 20px; border-radius: 20px; margin-top: 15px;
        }

        input, button { width: 100%; padding: 20px; border-radius: 18px; margin-bottom: 15px; font-weight: 700; border: none; outline: none; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; text-align: center; font-size: 16px; }
        input:focus { border-color: #60a5fa; background: rgba(255,255,255,0.1); }
        button { background: #ffffff; color: #000; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: #60a5fa; color: white; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .searching { animation: pulse 1s infinite; }
    </style>
</head>
<body>

    <header style="text-align:center; margin-bottom: 30px;">
        <img src="Logo.png" alt="Lexilias" style="height: 120px; filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.4));">
        <p style="font-size: 11px; letter-spacing: 4px; color: #60a5fa; font-weight: 900; margin-top: 10px; text-transform: uppercase;">Portal de Seguimiento</p>
    </header>

    <div class="glass-card" id="searchPanel">
        <input type="text" id="userExp" placeholder="Nº DE EXPEDIENTE">
        <input type="text" id="userBirth" placeholder="FECHA NACIMIENTO (DD/MM/AAAA)" maxlength="10" inputmode="numeric">
        <button id="mainBtn" onclick="buscarExpediente()">Consultar Mi Estado</button>
    </div>

    <div id="resultBox" style="display:none; width: 100%; max-width: 420px;">
        <div class="glass-card" style="text-align: center; border-top: 4px solid #60a5fa;">
            <h2 id="cName" style="font-weight: 900; text-transform: uppercase; font-size: 24px; letter-spacing: -0.5px;"></h2>
            <p id="cExp" style="font-size: 12px; color: #94a3b8; font-weight: 700; margin-top: 5px;"></p>
        </div>

        <div class="glass-card">
            <p style="font-size: 10px; font-weight: 900; color: #94a3b8; text-align: center; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase;">Estado de sus trámites</p>
            
            <div id="rowPenales" class="status-row">
                <div id="iconPenales" class="icon-box"><i class="fas fa-file-shield"></i></div>
                <div>
                    <p style="font-size: 10px; color: #94a3b8; font-weight: 900;">ESTADO A. PENALES</p>
                    <p id="txtPenales" style="font-weight: 900; font-size: 17px;"></p>
                </div>
            </div>

            <div id="rowPago" class="status-row">
                <div id="iconPago" class="icon-box"><i class="fas fa-money-bill-transfer"></i></div>
                <div>
                    <p style="font-size: 10px; color: #94a3b8; font-weight: 900;">PAGO DE SERVICIOS</p>
                    <p id="txtPago" style="font-weight: 900; font-size: 17px;"></p>
                </div>
            </div>

            <div id="rowPasaporte" class="status-row">
                <div id="iconPasaporte" class="icon-box"><i class="fas fa-passport"></i></div>
                <div>
                    <p style="font-size: 10px; color: #94a3b8; font-weight: 900;">ESTADO DE PASAPORTE</p>
                    <p id="txtPasaporte" style="font-weight: 900; font-size: 17px;"></p>
                </div>
            </div>

            <div id="boxNota" class="nota-alerta" style="display:none;">
                <p style="color: #ef4444; font-size: 11px; font-weight: 900; margin-bottom: 8px; text-transform: uppercase;">
                    <i class="fas fa-triangle-exclamation"></i> Atención - Mensaje de Lexilias:
                </p>
                <p id="txtNota" style="font-size: 14px; font-weight: 700; line-height: 1.5; color: #e2e8f0;"></p>
            </div>
        </div>
        <button onclick="location.reload()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); color:white;">Realizar otra consulta</button>
    </div>

    <a href="https://wa.me/34621188515" class="whatsapp-btn" target="_blank" title="Contactar por WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // Formateador automático de fecha
        document.getElementById('userBirth').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 2 && v.length <= 4) v = v.slice(0, 2) + '/' + v.slice(2);
            else if (v.length > 4) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4, 8);
            e.target.value = v;
        });

        // TU NUEVA URL DE API
        const API = "https://script.google.com/macros/s/AKfycbwdnK9DUUJ9Sw_FSg75TJXla-KUkOqt_ZFhL_hTI5W-1Ei3R1viDilFCgee2iqkIoM/exec";

        async function buscarExpediente() {
            const btn = document.getElementById('mainBtn');
            const expVal = document.getElementById('userExp').value.trim();
            const birthVal = document.getElementById('userBirth').value.trim();
            
            if(!expVal || !birthVal) { alert("Por favor complete los datos"); return; }

            btn.innerText = "VERIFICANDO...";
            btn.classList.add('searching');
            btn.disabled = true;

            try {
                const res = await fetch(API);
                const data = await res.json();
                const item = data.find(i => i.n_exp === expVal && i.fecha_nac === birthVal);

                if(item) {
                    document.getElementById('searchPanel').style.display = 'none';
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('cName').innerText = item.nombre;
                    document.getElementById('cExp').innerText = "REF: " + item.n_exp;

                    // Lógica de colores Dinámica
                    const updateStatus = (idRow, idIcon, idTxt, value, isPositive) => {
                        const row = document.getElementById(idRow);
                        const icon = document.getElementById(idIcon);
                        const txt = document.getElementById(idTxt);
                        txt.innerText = value.toUpperCase();
                        row.className = "status-row " + (isPositive ? "border-green" : "border-red");
                        icon.className = "icon-box " + (isPositive ? "bg-green" : "bg-red");
                    };

                    updateStatus('rowPenales', 'iconPenales', 'txtPenales', item.penales, !item.penales.toUpperCase().includes("INCIDENCIA") && !item.penales.toUpperCase().includes("NO TIENE"));
                    updateStatus('rowPago', 'iconPago', 'txtPago', item.pago_servicios, item.pago_servicios.toUpperCase().includes("PAGADO"));
                    updateStatus('rowPasaporte', 'iconPasaporte', 'txtPasaporte', item.pasaporte_est, item.pasaporte_est.toUpperCase().includes("ESCANEADO"));

                    if(item.nota_cliente && item.nota_cliente !== "") {
                        document.getElementById('boxNota').style.display = 'block';
                        document.getElementById('txtNota').innerText = item.nota_cliente;
                    }

                    if(item.pago_servicios.toUpperCase().includes("PAGADO")) confetti();

                } else {
                    alert("No se encontró ningún expediente con esos datos.");
                    btn.innerText = "Consultar Mi Estado";
                    btn.classList.remove('searching');
                    btn.disabled = false;
                }
            } catch(e) {
                alert("Error de conexión. Inténtelo más tarde.");
                btn.innerText = "Consultar Mi Estado";
                btn.classList.remove('searching');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
