<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento Profesional</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #020617 !important; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%) !important;
            color: #ffffff !important; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 25px; }
        .logo-text { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: 0.4em; margin: 0; }
        .sub-text { font-size: 9px; letter-spacing: 0.5em; color: #60a5fa; text-transform: uppercase; margin-top: 10px; font-weight: bold; }

        .glass-card { 
            background-color: #1e293b !important; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Gears Animation */
        .bg-gears {
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 180px; color: rgba(255, 255, 255, 0.03);
            z-index: 0; pointer-events: none;
        }
        .gear-spin { animation: gear-rotate 10s linear infinite; }
        @keyframes gear-rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        input {
            width: 100%; background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px; border-radius: 15px;
            color: white; text-align: center; font-size: 18px;
            font-weight: bold; margin-bottom: 15px; box-sizing: border-box;
            text-transform: uppercase; outline: none;
        }

        button {
            width: 100%; background-color: #ffffff !important; color: #000000 !important;
            padding: 18px; border: none; border-radius: 15px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; font-size: 12px; transition: all 0.2s ease;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #resultBox { width: 100%; max-width: 380px; display: none; }
        
        .client-info { background: rgba(0,0,0,0.4); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        
        .alert-critical { 
            animation: pulse-red 2s infinite; 
            background: rgba(220, 38, 38, 0.3) !important; 
            border: 2px solid #ef4444 !important; 
            border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 20px;
        }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .step { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; position: relative; z-index: 1; }
        .dot { 
            width: 14px; height: 14px; border-radius: 50%; 
            border: 2px dashed #2563eb; flex-shrink: 0; 
            position: relative; animation: spin-blue 2s linear infinite; box-shadow: 0 0 10px #2563eb;
        }
        @keyframes spin-blue { to { transform: rotate(360deg); } }

        .step-text { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #ffffff; }
        .fecha { color: #60a5fa; font-size: 11px; display: block; margin-top: 4px; font-weight: 900; }

        .doc-row { 
            display: flex; align-items: center; gap: 15px; 
            padding: 12px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 15px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative; z-index: 1;
        }
        .status-badge { 
            width: 30px; height: 30px; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 11px;
        }
        .bg-ok { background: #ffffff; color: #000; }
        .bg-no { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #25d366 !important; color: white !important; padding: 12px 20px;
            border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 11px;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        #downloadBtn {
            background-color: #2563eb !important; color: white !important;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer;
        }
    </style>
</head>
<body>

    <a href="https://wa.me/34621188515" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> CONTACTAR OFICINA
    </a>

    <header>
        <img src="Logo.png" alt="Lexilias" style="height: 55px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto;">
        <h1 class="logo-text">LEXILIAS</h1>
        <p class="sub-text">Gestión Jurídica Profesional</p>
    </header>

    <div class="glass-card" id="searchSection">
        <input type="text" id="userInput" placeholder="Nº EXP O PASAPORTE">
        <button id="btnSearch" onclick="buscarExpediente()">Consultar Estado</button>
    </div>

    <div id="resultBox">
        <div id="captureArea"> 
            <div class="client-info">
                <span style="color: #60a5fa; font-size: 9px; font-weight: 900; letter-spacing: 2px;">EXPEDIENTE LOCALIZADO</span>
                <h2 id="cName" style="margin: 10px 0; font-size: 24px; font-weight: 900; font-style: italic;"></h2>
                <p id="cExp" style="color: #475569; font-size: 10px; font-weight: bold;"></p>
            </div>

            <div id="incidenciaDiv" class="alert-critical" style="display: none;">
                <i class="fas fa-exclamation-triangle" style="color: #ef4444; font-size: 24px; margin-bottom: 10px;"></i>
                <h4 style="color: #ef4444; margin: 0; font-weight: 900; text-transform: uppercase; font-size: 16px;">¡Atención!</h4>
                <p style="margin: 8px 0 0 0; font-size: 12px; font-weight: bold; line-height: 1.4;">Se ha detectado una INCIDENCIA. Por favor, póngase en contacto con nuestra oficina urgentemente.</p>
            </div>

            <div id="timelineCard" class="glass-card">
                <p style="text-align: center; font-size: 9px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 25px; color: #64748b; letter-spacing: 2px;">EVOLUCIÓN DEL TRÁMITE</p>
                <div id="timelineContent"></div>
            </div>

            <div class="glass-card" id="docsCard">
                <div class="bg-gears"><i class="fas fa-cog gear-spin"></i></div>
                <p style="text-align: center; font-size: 9px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 25px; color: #64748b; letter-spacing: 2px; position: relative; z-index: 1;">DOCUMENTACIÓN</p>
                <div id="docsContent"></div>
                <p style="text-align: center; font-size: 8px; color: #475569; margin-top: 15px; font-weight: bold; position: relative; z-index: 1;">DOCUMENTACIÓN ACTUALIZADA</p>
            </div>
        </div>

        <button id="downloadBtn" onclick="generarPDF()">
            <i class="fas fa-file-pdf"></i> DESCARGAR JUSTIFICANTE (PDF)
        </button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwySMAtY8mrP4RO47VHW3iBX9OHjTbozBc_zmmjXNNWMpJobGO9KrZu_ghGC5GRiFc/exec";

        async function buscarExpediente() {
            const btn = document.getElementById('btnSearch');
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;

            btn.innerText = "BUSCANDO...";
            btn.disabled = true;
            
            try {
                const res = await fetch(API);
                const data = await res.json();
                
                const item = data.find(i => 
                    (i.n_exp && String(i.n_exp).toUpperCase() === val) || 
                    (i.pasaporte && String(i.pasaporte).toUpperCase() === val)
                );

                if (item) {
                    document.getElementById('resultBox').style.display = 'block';
                    
                    let nombreCompleto = item.nombre || "CLIENTE";
                    let partes = nombreCompleto.split(" ");
                    document.getElementById('cName').innerText = partes[0] + (partes[1] ? " " + partes[1][0] + "..." : "");
                    
                    document.getElementById('cExp').innerText = "REG: " + (item.n_exp || "---");
                    
                    const est = String(item.estado_ap || "").toUpperCase();

                    if (est.includes("INCIDENCIA")) {
                        document.getElementById('incidenciaDiv').style.display = 'block';
                        document.getElementById('timelineCard').style.display = 'none';
                    } else {
                        document.getElementById('incidenciaDiv').style.display = 'none';
                        document.getElementById('timelineCard').style.display = 'block';
                    }

                    let fT = "--/--/--";
                    if (item.fecha_cad) {
                        const d = new Date(item.fecha_cad);
                        if (!isNaN(d)) {
                            fT = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                        }
                    }

                    let mensajeFinal = "";
                    if (est === "NO TIENE") mensajeFinal = "NO TIENE PENALES";
                    else if (est === "RECIBIDO") mensajeFinal = `RECIBIDO CON TRADUCCIÓN <span class="fecha">CADUCIDAD: ${fT}</span>`;
                    else if (est === "TRAMITADO") {
                        mensajeFinal = "ENVIADO A TRADUCIR (EN PROCESO)";
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    }
                    else mensajeFinal = est || "EN ESTUDIO";

                    document.getElementById('timelineContent').innerHTML = `
                        <div class="step">
                            <div class="dot"></div>
                            <div class="step-text">${mensajeFinal}</div>
                        </div>`;

                    const docsArr = [
                        { n: "Pasaporte", v: String(item.pasaporte || "") },
                        { n: "Contratos", v: String(item.contracts || item.contratos || "PENDIENTE") },
                        { n: "Tasa Pago", v: String(item.pagado_ap || "NO") }
                    ];

                    document.getElementById('docsContent').innerHTML = docsArr.map(d => {
                        const isOK = ["ESCANEADO", "PAGADO", "TIENE", "SI", "OK"].includes(d.v.toUpperCase());
                        return `<div class="doc-row">
                            <div class="status-badge ${isOK ? 'bg-ok' : 'bg-no'}">
                                <i class="fas ${isOK ? 'fa-check' : 'fa-times'}"></i>
                            </div>
                            <div>
                                <p style="font-size: 7px; color: #475569; font-weight: 900; margin:0; text-transform:uppercase;">${d.n}</p>
                                <p style="font-size: 13px; font-weight: 900; margin:0; color: ${isOK ? '#fff' : '#ef4444'}; text-transform:uppercase;">${d.v}</p>
                            </div>
                        </div>`;
                    }).join('');

                    window.scrollTo({ top: document.getElementById('resultBox').offsetTop - 20, behavior: 'smooth' });
                } else {
                    alert("No se ha encontrado ningún expediente con esos datos.");
                }
            } catch (e) {
                alert("Error de conexión con el servidor.");
            } finally {
                btn.innerText = "CONSULTAR ESTADO";
                btn.disabled = false;
            }
        }

        function generarPDF() {
            const element = document.getElementById('captureArea'); // نلتقط منطقة البيانات فقط
            const btn = document.getElementById('downloadBtn');
            const waBtn = document.querySelector('.whatsapp-btn');

            // إخفاء الأزرار مؤقتاً
            btn.style.display = 'none';
            waBtn.style.display = 'none';

            const opt = {
                margin:       [10, 5, 10, 5],
                filename:     `Justificante_${document.getElementById('cName').innerText}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    backgroundColor: '#020617', 
                    useCORS: true,
                    scrollY: 0
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.style.display = 'flex';
                waBtn.style.display = 'flex';
            });
        }
    </script>
</body>
</html>
