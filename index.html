<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%);
            color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }
        header { text-align: center; margin-bottom: 30px; width: 100%; }
        .logo-img { width: 280px; height: auto; filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.5)); }
        .sub-text { font-size: 11px; letter-spacing: 0.3em; color: #60a5fa; text-transform: uppercase; font-weight: bold; }

        .glass-card { 
            background-color: #1e293b; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 25px; width: 100%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .section-header {
            text-align: center; font-size: 14px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 15px; margin-bottom: 20px; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase;
        }
        input {
            width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px; border-radius: 15px; color: white; text-align: center; font-size: 16px;
            font-weight: bold; margin-bottom: 15px; outline: none;
        }
        button {
            width: 100%; background-color: #ffffff; color: #000000; padding: 18px; 
            border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer;
        }
        #resultBox { width: 100%; max-width: 380px; display: none; }
        .client-info { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .doc-row { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 10px; }
        .status-badge { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .bg-ok { background: #ffffff; color: #000; }
        .bg-no { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 9999; }
    </style>
</head>
<body>

    <a href="https://wa.me/34621188515" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> CONTACTAR</a>

    <header>
        <img src="https://i.postimg.cc/9FmS7m8m/Logo.png" alt="Lexilias" class="logo-img">
        <p class="sub-text">Servicio jurídico Extranjería</p>
    </header>

    <div class="glass-card" id="searchPanel">
        <p class="section-header">Acceso Clientes</p>
        <input type="text" id="userExp" placeholder="Nº DE EXPEDIENTE (Ejem: 1)">
        <input type="text" id="userBirth" placeholder="FECHA NACIMIENTO (DD/MM/AAAA)">
        <button id="btnSearch" onclick="buscarExpediente()">Consultar Estado</button>
    </div>

    <div id="resultBox">
        <div id="captureArea">
            <div class="client-info">
                <h2 id="cName" style="font-size: 22px; font-weight: 900; color: #60a5fa;"></h2>
                <p id="cExpInfo" style="font-size: 11px; color: #94a3b8; margin-top: 5px;"></p>
            </div>
            <div class="glass-card">
                <p class="section-header">Documentación</p>
                <div id="docsContent"></div>
            </div>
            <div id="noteBox" class="glass-card" style="display:none; border: 1px dashed #60a5fa;">
                <p id="cNote" style="text-align: center; font-style: italic;"></p>
            </div>
        </div>
        <button onclick="generarPDF()" style="background:#2563eb; color:white; margin-bottom: 50px;">Descargar PDF</button>
    </div>

    <script>
        // TU URL ACTUALIZADA
        const API_URL = "https://script.google.com/macros/s/AKfycbykY05Qo-Qjhq7XnjCymcdHzMAdxnBJ4l7YXUYeWvqHIqHlgdmcJfG0LLbETn89SQQ/exec";

        async function buscarExpediente() {
            const expInput = document.getElementById('userExp').value.trim();
            const birthInput = document.getElementById('userBirth').value.trim();
            const btn = document.getElementById('btnSearch');

            if(!expInput || !birthInput) { alert("Completa ambos campos"); return; }

            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // FILTRADO: Buscamos en la lista el que coincida
                const cliente = data.find(c => 
                    String(c.n_exp) === expInput && 
                    String(c.fecha_nac).trim() === birthInput
                );

                if(cliente) {
                    mostrarResultados(cliente);
                } else {
                    alert("No se encontró el expediente. Revisa que el número y la fecha (DD/MM/AAAA) sean correctos.");
                }
            } catch (error) {
                alert("Error al conectar. Inténtalo de nuevo.");
            } finally {
                btn.innerText = "CONSULTAR ESTADO";
                btn.disabled = false;
            }
        }

        function mostrarResultados(c) {
            document.getElementById('searchPanel').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('cName').innerText = c.nombre;
            document.getElementById('cExpInfo').innerText = "EXPEDIENTE: " + c.n_exp + " | NACIMIENTO: " + c.fecha_nac;

            const docs = [
                { n: "Ant. Penales", v: c.estado_penales },
                { n: "Pago Tasas", v: c.pagado },
                { n: "Contratos", v: c.contratos },
                { n: "Pasaporte", v: c.pasaporte_esc }
            ];

            document.getElementById('docsContent').innerHTML = docs.map(d => {
                const val = String(d.v || "PENDIENTE").toUpperCase();
                const ok = ["SI", "PAGADO", "OK", "TRAMITADO", "ESCANEADO", "RECIBIDO"].includes(val);
                return `
                    <div class="doc-row">
                        <div class="status-badge ${ok ? 'bg-ok' : 'bg-no'}"><i class="fas ${ok ? 'fa-check' : 'fa-times'}"></i></div>
                        <div>
                            <p style="font-size: 9px; color: #94a3b8;">${d.n}</p>
                            <p style="font-size: 14px; font-weight: 900;">${val}</p>
                        </div>
                    </div>`;
            }).join('');

            if(c.nota_cliente && c.nota_cliente !== "NADA") {
                document.getElementById('noteBox').style.display = 'block';
                document.getElementById('cNote').innerText = c.nota_cliente;
            }
            if(String(c.estado_penales).toUpperCase() === "TRAMITADO") confetti();
        }

        function generarPDF() {
            const element = document.getElementById('captureArea');
            html2pdf().from(element).set({
                margin: 10,
                filename: 'Justificante_Lexilias.pdf',
                html2canvas: { scale: 2, backgroundColor: '#020617' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }
    </script>
</body>
</html>
