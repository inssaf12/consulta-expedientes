<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexilias | Consulta</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #020617; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .glass-card { background: #1e293b; border-radius: 20px; padding: 25px; width: 100%; max-width: 380px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #334155; text-align: center; background: #000; color: #fff; font-size: 16px; text-transform: uppercase; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; background: #fff; color: #000; text-transform: uppercase; }
        #resultBox { display: none; width: 100%; max-width: 380px; margin-top: 20px; }
        .doc-row { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fff; color: #000; }
        .error-badge { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/6R0yYfM/Logo.png" style="height: 120px; margin-bottom: 10px;">
    <p style="color: #60a5fa; letter-spacing: 2px; font-size: 10px; font-weight: bold;">SERVICIO JURÍDICO EXTRANJERÍA</p>

    <div class="glass-card">
        <input type="text" id="userExp" placeholder="Nº DE EXPEDIENTE">
        <input type="text" id="userPass" placeholder="Nº DE PASAPORTE">
        <button id="btnSearch" onclick="buscar()">CONSULTAR ESTADO</button>
    </div>

    <div id="resultBox">
        <div class="glass-card" style="text-align: center;">
            <h2 id="cName" style="font-style: italic; font-weight: 900;"></h2>
            <p id="cExp" style="font-size: 11px; color: #94a3b8; margin-top: 5px;"></p>
        </div>
        <div class="glass-card">
            <div id="docsContent"></div>
        </div>
    </div>

    <script>
        // USA TU ÚLTIMO ENLACE AQUÍ
        const API_URL = "https://script.google.com/macros/s/AKfycbw4bKsIXIoyWEbIS6bRTy9Goy76yuhsOljvaPCQe61i3L2VQEs_DCC94yPKpx-dczs/exec";

        async function buscar() {
            const btn = document.getElementById('btnSearch');
            const exp = document.getElementById('userExp').value.trim().toUpperCase();
            const pass = document.getElementById('userPass').value.trim().toUpperCase();

            if(!exp || !pass) return alert("Por favor, rellena los campos.");

            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                // EL TRUCO: "mode: 'cors'" y "redirect: 'follow'" para saltar el bloqueo
                const response = await fetch(API_URL, {
                    method: 'GET',
                    mode: 'cors',
                    redirect: 'follow'
                });
                
                const data = await response.json();
                
                const item = data.find(i => 
                    String(i.n_exp).toUpperCase() === exp && 
                    String(i.num_pasaporte).toUpperCase() === pass
                );

                if(item) {
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('cName').innerText = item.nombre;
                    document.getElementById('cExp').innerText = "EXP: " + item.n_exp + " | PAS: " + item.num_pasaporte;
                    
                    const list = [
                        {n: "PASAPORTE", v: item.pasaporte_esc},
                        {n: "CONTRATOS", v: item.contratos},
                        {n: "TASAS", v: item.pagado_ap},
                        {n: "ESTADO", v: item.estado_ap}
                    ];

                    document.getElementById('docsContent').innerHTML = list.map(d => {
                        const val = String(d.v || "PENDIENTE").toUpperCase();
                        const ok = ["SI", "OK", "PAGADO", "ESCANEADO", "TRAMITADO"].includes(val);
                        return `
                        <div class="doc-row">
                            <div class="status-badge ${ok ? '' : 'error-badge'}">
                                <i class="fas ${ok ? 'fa-check' : 'fa-times'}"></i>
                            </div>
                            <div>
                                <small style="display:block; font-size:9px; color:#94a3b8;">${d.n}</small>
                                <strong style="font-size:14px;">${val}</strong>
                            </div>
                        </div>`;
                    }).join('');
                    
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert("No encontrado. Verifica los datos.");
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión. Prueba a abrir la web en modo incógnito o limpia el historial.");
            } finally {
                btn.innerText = "CONSULTAR ESTADO";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
