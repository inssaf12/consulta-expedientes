<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento Seguro</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #020617 !important; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%) !important;
            color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        /* Área de captura para el PDF */
        #captureArea { width: 100%; max-width: 400px; padding: 10px; }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-img { height: 130px; width: auto; margin: 0 auto 5px; display: block; }
        .sub-text { font-size: 10px; letter-spacing: 3px; color: #60a5fa; text-transform: uppercase; font-weight: 900; }

        .glass-card { 
            background: #1e293b !important; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative;
        }

        .section-header {
            text-align: center; font-size: 13px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase;
        }

        .client-info { background: #0f172a; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #1e293b; }
        
        .step { display: flex; align-items: center; gap: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #2563eb; flex-shrink: 0; box-shadow: 0 0 8px #2563eb; }
        .step-text { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #fff; }

        .doc-row { 
            display: flex; align-items: center; gap: 12px; padding: 10px; 
            background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 8px;
        }

        .status-badge { width: 25px; height: 25px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .bg-ok { background: #ffffff; color: #000; }
        .bg-no { background: #ef4444; color: #fff; }

        #searchPanel input {
            width: 100%; background: #000; border: 1px solid #334155;
            padding: 15px; border-radius: 12px; color: white; text-align: center; margin-bottom: 10px;
        }
        #searchPanel button {
            width: 100%; background: white; color: black; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer;
        }

        #downloadBtn {
            background: #2563eb; color: white; width: 100%; max-width: 380px; padding: 18px; border-radius: 15px; 
            font-weight: 900; border: none; margin-bottom: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div class="glass-card" id="searchPanel" style="margin-top: 50px;">
        <p class="section-header">ACCESO SEGURO</p>
        <input type="text" id="userExp" placeholder="Nº EXPEDIENTE">
        <input type="text" id="userBirth" placeholder="FECHA NACIMIENTO">
        <button onclick="buscarExpediente()">CONSULTAR</button>
    </div>

    <div id="resultBox" style="display:none;">
        <div id="captureArea">
            <div class="logo-container">
                <img src="Logo.png" alt="Lexilias" class="logo-img">
                <p class="sub-text">Servicio Jurídico Extranjería</p>
            </div>

            <div class="client-info">
                <h2 id="cName" style="font-size: 22px; font-weight: 900; color: #fff;"></h2>
                <p id="cExp" style="color: #94a3b8; font-size: 11px; margin-top: 5px;"></p>
            </div>

            <div class="glass-card">
                <p class="section-header">EVOLUCIÓN DEL TRÁMITE</p>
                <div id="timelineContent"></div>
            </div>

            <div class="glass-card">
                <p class="section-header">ESTADO DOCUMENTAL</p>
                <div id="docsContent"></div>
            </div>

            <div id="notesCard" class="glass-card" style="display:none;">
                <p class="section-header">NOTAS</p>
                <p id="cNotes" style="font-size: 13px; color: #cbd5e1; line-height: 1.5;"></p>
            </div>
        </div>
        
        <button id="downloadBtn" onclick="generarPDF()">
            <i class="fas fa-file-pdf"></i> DESCARGAR PDF
        </button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbykY05Qo-Qjhq7XnjCymcdHzMAdxnBJ4l7YXUYeWvqHIqHlgdmcJfG0LLbETn89SQQ/exec";

        async function buscarExpediente() {
            const exp = document.getElementById('userExp').value.trim();
            const birth = document.getElementById('userBirth').value.trim();
            if(!exp || !birth) return alert("Faltan datos");

            try {
                const res = await fetch(API);
                const data = await res.json();
                const item = data.find(i => String(i.n_exp) === exp && String(i.fecha_nac).trim() === birth);
                if (item) { mostrarTodo(item); } else { alert("No encontrado"); }
            } catch (e) { alert("Error"); }
        }

        function mostrarTodo(item) {
            document.getElementById('searchPanel').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('cName').innerText = item.nombre;
            document.getElementById('cExp').innerText = "REG: " + item.n_exp + " | " + item.fecha_nac;
            
            const est = String(item.estado_penales || "").toUpperCase();
            let mensaje = est;
            let sub = "";

            if (est === "LO HA TRAIDO EL") {
                mensaje = "DOCUMENTACIÓN APORTADA";
                if(item["fecha_cad_ant_penales"]) sub = `<div style="font-size:11px; color:#94a3b8; margin-top:4px;">CAD: ${item["fecha_cad_ant_penales"]}</div>`;
            } else if (est === "TRAMITADO") { 
                mensaje = "ENVIADO A TRADUCIR"; 
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            
            document.getElementById('timelineContent').innerHTML = `
                <div class="step">
                    <div class="dot"></div>
                    <div><div class="step-text">${mensaje}</div>${sub}</div>
                </div>`;

            const dList = [
                {n: "Pasaporte", v: item.pasaporte_esc},
                {n: "Contratos", v: item.contratos},
                {n: "Tasas", v: item.pagado}
            ];
            document.getElementById('docsContent').innerHTML = dList.map(d => {
                const ok = ["ESCANEADO", "PAGADO", "TIENE", "SI", "OK"].includes(String(d.v).toUpperCase());
                return `<div class="doc-row">
                    <div class="status-badge ${ok ? 'bg-ok' : 'bg-no'}"><i class="fas ${ok ? 'fa-check' : 'fa-times'}"></i></div>
                    <div style="font-size:12px; font-weight:900; color:#fff;">${d.n}: ${d.v || 'PENDIENTE'}</div>
                </div>`;
            }).join('');

            if(item.nota_cliente && item.nota_cliente !== "NADA") {
                document.getElementById('notesCard').style.display = 'block';
                document.getElementById('cNotes').innerText = item.nota_cliente;
            }
        }

        function generarPDF() {
            const element = document.getElementById('captureArea');
            const opt = {
                margin: 10,
                filename: 'Justificante_Lexilias.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 3, 
                    backgroundColor: '#020617',
                    useCORS: true 
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
