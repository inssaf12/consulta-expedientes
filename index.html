<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700;900&display=swap');
        
        /* ألوان ثابتة لضمان اشتغال التصميم الداكن دائماً */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #020617 !important; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%) !important;
            color: #ffffff !important; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        .logo-text { font-family: 'Cinzel', serif; font-size: 26px; letter-spacing: 0.4em; margin: 0; color: #ffffff; }
        .sub-text { font-size: 9px; letter-spacing: 0.5em; color: #60a5fa; text-transform: uppercase; margin-top: 10px; font-weight: bold; }

        /* البطاقة الرئيسية */
        .glass-card { 
            background-color: #1e293b !important; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 18px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            box-sizing: border-box;
            text-transform: uppercase;
            outline: none;
        }

        button {
            width: 100%;
            background-color: #ffffff !important;
            color: #000000 !important;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-size: 12px;
            transition: transform 0.2s;
        }
        
        button:active { transform: scale(0.98); }

        /* صندوق النتائج */
        #resultBox { width: 100%; max-width: 380px; margin-top: 30px; display: none; }
        
        .client-info { 
            background: rgba(0,0,0,0.4); 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 20px; 
        }

        /* مراحل التتبع (Timeline) */
        .step { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 30px; position: relative; }
        .dot { 
            width: 14px; height: 14px; border-radius: 50%; 
            border: 2px solid #334155; flex-shrink: 0; margin-top: 2px;
        }
        .dot.active { background-color: #2563eb; border-color: #2563eb; box-shadow: 0 0 15px #2563eb; }
        .dot.past { background-color: #334155; border-color: #334155; }
        
        .step-text { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #475569; letter-spacing: 1px; }
        .step-text.active { color: #ffffff; }
        .fecha { color: #60a5fa; font-size: 10px; display: block; margin-top: 4px; font-weight: bold; }

        /* زر الواتساب */
        .whatsapp-btn {
            position: fixed; bottom: 25px; right: 20px;
            background: #25d366 !important; color: white !important; padding: 14px 22px;
            border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 11px;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

    <a href="https://wa.me/34621188515" class="whatsapp-btn">
        <i class="fab fa-whatsapp text-lg"></i> CONTACTAR CON OFICINA
    </a>

    <header>
        <img src="Logo.png" alt="" style="height: 60px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto;">
        <h1 class="logo-text">LEXILIAS</h1>
        <p class="sub-text">Gestión Jurídica Profesional</p>
    </header>

    <div class="glass-card">
        <input type="text" id="userInput" placeholder="Nº EXP O PASAPORTE">
        <button onclick="buscarExpediente()">Consultar Estado</button>
    </div>

    <div id="resultBox">
        <div class="client-info">
            <span style="color: #60a5fa; font-size: 9px; font-weight: 900; letter-spacing: 3px;">EXPEDIENTE LOCALIZADO</span>
            <h2 id="cName" style="margin: 15px 0 5px 0; font-size: 24px; text-transform: uppercase; font-style: italic; font-weight: 900;"></h2>
            <p id="cExp" style="color: #475569; font-size: 10px; margin: 0; font-weight: bold; letter-spacing: 1px;"></p>
        </div>

        <div class="glass-card" style="padding: 30px;">
            <p style="text-align: center; font-size: 9px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 25px; letter-spacing: 2px; color: #64748b;">EVOLUCIÓN DEL TRÁMITE</p>
            <div id="timelineContent"></div>
        </div>
    </div>

    <script>
        // رابط API الخاص بجدول بيانات جوجل
        const API = "https://script.google.com/macros/s/AKfycbwySMAtY8mrP4RO47VHW3iBX9OHjTbozBc_zmmjXNNWMpJobGO9KrZu_ghGC5GRiFc/exec";
        const PASOS = ["NO TIENE", "LO HA TRAIDO EL", "RECIBIDO", "TRAMITADO"];

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;
            
            try {
                const res = await fetch(API);
                const data = await res.json();
                // البحث بواسطة رقم الملف أو جواز السفر
                const item = data.find(i => (i.n_exp && String(i.n_exp).toUpperCase() === val) || (i.pasaporte && String(i.pasaporte).toUpperCase() === val));

                if (item) {
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('cName').innerText = item.nombre;
                    document.getElementById('cExp').innerText = "REG: " + item.n_exp;
                    
                    // تنسيق التاريخ ليظهر بشكل نقي
                    let fechaText = "";
                    if (item.fecha_cad) {
                        const d = new Date(item.fecha_cad);
                        fechaText = !isNaN(d) ? d.toLocaleDateString('es-ES') : String(item.fecha_cad).split('T')[0];
                    }

                    const estado = String(item.estado_ap || "").toUpperCase();
                    let idxAct = -1;
                    PASOS.forEach((p, idx) => { if(estado.includes(p)) idxAct = idx; });

                    // بناء التايملاين
                    document.getElementById('timelineContent').innerHTML = PASOS.map((p, i) => {
                        const isAct = i === idxAct;
                        const isPast = i < idxAct;
                        return `
                            <div class="step">
                                <div class="dot ${isAct ? 'active' : (isPast ? 'past' : '')}"></div>
                                <div class="step-text ${isAct ? 'active' : ''}">
                                    ${p}
                                    ${(p === "LO HA TRAIDO EL" && (isAct || isPast)) ? `<span class="fecha">${fechaText}</span>` : ""}
                                </div>
                            </div>`;
                    }).join('');

                    // تأثير الاحتفال عند انتهاء المعاملة
                    if(estado.includes("TRAMITADO")) {
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    }
                } else { 
                    alert("Lo sentimos, no hemos encontrado ese número de expediente."); 
                }
            } catch (e) { 
                alert("Error de conexión. Inténtelo de nuevo."); 
            }
        }
    </script>
</body>
</html>
