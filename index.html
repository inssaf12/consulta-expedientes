<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexilias | Consulta de Estado</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: #020617; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .logo-img { height: 100px; margin-bottom: 20px; }
        .glass-card { background: #1e293b; border-radius: 20px; padding: 25px; width: 100%; max-width: 380px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: none; text-align: center; background: #000; color: #fff; font-size: 16px; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; background: #fff; color: #000; text-transform: uppercase; }
        #resultBox { display: none; width: 100%; max-width: 380px; }
        .doc-row { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid #60a5fa; }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/6R0yYfM/Logo.png" class="logo-img">

    <div class="glass-card">
        <input type="text" id="userExp" placeholder="Nº DE EXPEDIENTE">
        <input type="text" id="userBirth" placeholder="FECHA NACIMIENTO (DD/MM/AAAA)">
        <button id="btnSearch" onclick="buscar()">CONSULTAR MI ESTADO</button>
    </div>

    <div id="resultBox">
        <div class="glass-card" style="text-align: center;">
            <h2 id="cName" style="font-style: italic; font-weight: 900;"></h2>
            <p style="color: #60a5fa; font-size: 10px; font-weight: 900; margin-top: 5px;">CLIENTE VERIFICADO</p>
        </div>

        <div class="glass-card">
            <div id="docsContent"></div>
        </div>

        <div id="noteBox" class="glass-card" style="background: rgba(96,165,250,0.1); display:none;">
            <p style="font-size: 10px; color: #60a5fa; font-weight: 900; margin-bottom: 5px;">NOTAS ADICIONALES:</p>
            <p id="cNote" style="font-size: 14px; font-style: italic;"></p>
        </div>
    </div>

    <script>
        // TU ENLACE QUE YA FUNCIONA
        const API_URL = "https://script.google.com/macros/s/AKfycbzd9O_IOQD5khXIaC_1AViTcQOmrTaQ-7W884EUVD9uh4fyv_gP5v4gYKBhc4U_amQ/exec";

        async function buscar() {
            const btn = document.getElementById('btnSearch');
            const exp = document.getElementById('userExp').value.trim();
            const birth = document.getElementById('userBirth').value.trim();

            if(!exp || !birth) return alert("Por favor, introduce ambos datos.");

            btn.innerText = "CONECTANDO...";
            btn.disabled = true;

            try {
                // El "?v=" ayuda a que no se carguen datos viejos
                const response = await fetch(API_URL + "?v=" + Math.random());
                const data = await response.json();
                
                // Buscamos por n_exp y fecha_nac según tu nueva tabla
                const item = data.find(i => i.n_exp === exp && i.fecha_nac === birth);

                if(item) {
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('cName').innerText = item.nombre;
                    
                    const list = [
                        {n: "ESTADO PENALES", v: item.estado_penales},
                        {n: "PAGO DE TASAS", v: item.pagado},
                        {n: "CONTRATOS", v: item.contratos},
                        {n: "PASAPORTE", v: item.pasaporte_esc}
                    ];

                    document.getElementById('docsContent').innerHTML = list.map(d => `
                        <div class="doc-row">
                            <i class="fas fa-check-circle" style="color:#60a5fa"></i>
                            <div>
                                <small style="display:block; font-size:9px; color:#94a3b8; font-weight:900;">${d.n}</small>
                                <strong style="font-size:14px;">${d.v || 'PENDIENTE'}</strong>
                            </div>
                        </div>`).join('');

                    if(item.nota_cliente && item.nota_cliente !== "NADA") {
                        document.getElementById('noteBox').style.display = 'block';
                        document.getElementById('cNote').innerText = item.nota_cliente;
                    } else {
                        document.getElementById('noteBox').style.display = 'none';
                    }
                } else {
                    alert("No se encontró el expediente. Revisa que el número y la fecha coincidan con el Excel.");
                }
            } catch (e) {
                alert("Error de conexión. Inténtalo de nuevo en unos segundos.");
            } finally {
                btn.innerText = "CONSULTAR MI ESTADO";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
