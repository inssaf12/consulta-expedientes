<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento Jurídico | Ejidoforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-ejido { background-color: #002855; }
        .text-ejido { color: #002855; }
        .progress-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white shadow-sm border-b-4 border-yellow-600 p-4 mb-6">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <img src="Logo.png" alt="Logo" class="h-12">
            <div class="text-right text-ejido font-black uppercase text-sm">Ejidoforma Almería</div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100 mb-6">
            <h2 class="text-center font-bold text-slate-700 mb-4">Consulta tu Expediente</h2>
            <input type="text" id="userInput" placeholder="Nº EXP o Pasaporte" 
                class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-center text-xl font-black uppercase focus:ring-4 focus:ring-blue-100 outline-none mb-4">
            <button onclick="buscarExpediente()" class="w-full bg-ejido text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                CONSULTAR ESTADO
            </button>
        </div>

        <div id="resultBox" class="hidden bg-white rounded-3xl p-6 shadow-2xl border border-slate-50 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 font-black text-ejido text-4xl opacity-20" id="percentLarge">0%</div>
            
            <div class="mb-6">
                <h3 id="clientName" class="text-2xl font-black text-ejido uppercase"></h3>
                <p id="expDetail" class="text-slate-400 font-bold text-xs uppercase tracking-widest"></p>
            </div>

            <div class="mb-8">
                <div class="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-2">
                    <span>Progreso del Trámite</span>
                    <span id="percentSmall">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                    <div id="progressBar" class="progress-bar bg-green-500 h-full w-0"></div>
                </div>
            </div>

            <div id="timeline" class="space-y-6 relative">
                </div>

            <div id="notasBox" class="mt-8 p-4 bg-blue-50 border-l-4 border-ejido rounded-r-lg text-sm text-slate-600 italic">
            </div>
        </div>
    </div>

    <script>
        // الصقي هنا الرابط الجديد الذي حصلت عليه من الـ Deploy
        const MI_API_URL = "https://script.google.com/macros/s/AKfycbzi-egiSzkJKvQ6l8NMXJ8wOpEmoRj3qZT90_nhhzPTJ7bmo9FLcqKC2obQBra0cYM/exec";

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;

            try {
                const response = await fetch(MI_API_URL);
                const data = await response.json();
                const item = data.find(i => String(i.n_exp).toUpperCase() === val || String(i.pasaporte).toUpperCase() === val);

                if (item) {
                    mostrarResultado(item);
                } else {
                    alert("No se encontró el expediente");
                }
            } catch (e) { alert("Error de conexión"); }
        }

        function mostrarResultado(item) {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('clientName').innerText = item.nombre;
            document.getElementById('expDetail').innerText = "Expediente: " + item.n_exp;
            document.getElementById('notasBox').innerHTML = "<strong>Notas:</strong> " + (item.notas || "En proceso");

            const steps = [
                { label: "Pasaporte Escaneado", ok: item.pasaporte.toUpperCase().includes("ESCANEADO") },
                { label: "Contratos Listos", ok: item.contratos.toUpperCase().includes("TIENE") },
                { label: "Tasa Pagada", ok: item.pagado_ap.toUpperCase().includes("PAGADO") },
                { label: "Antecedentes Penales", ok: ["RECIBIDO", "TRAMITADO"].includes(item.estado_ap.toUpperCase()) }
            ];

            let completed = 0;
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = "";

            steps.forEach((step, index) => {
                if(step.ok) completed++;
                const color = step.ok ? "text-green-600" : "text-slate-300";
                const icon = step.ok ? "fa-check-circle" : "fa-circle";
                
                timeline.innerHTML += `
                    <div class="flex items-center gap-4">
                        <i class="fas ${icon} ${color} text-xl z-10 bg-white"></i>
                        <span class="font-bold ${step.ok ? 'text-slate-800' : 'text-slate-300'}">${step.label}</span>
                    </div>
                `;
            });

            const percent = (completed / steps.length) * 100;
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('percentSmall').innerText = percent + "%";
            document.getElementById('percentLarge').innerText = percent + "%";
        }
    </script>
</body>
</html>
