<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento Pro | Ejidoforma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bg-ejido { background-color: #002855; }
        .text-ejido { color: #002855; }
        .step-line { position: relative; }
        .step-line::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; z-index: 1; }
        .active-line::before { background: #22c55e; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <nav class="bg-white p-4 shadow-md border-b-4 border-yellow-600 mb-6">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <img src="Logo.png" alt="Logo" class="h-10">
            <h2 class="text-ejido font-black text-xs uppercase">Portal del Cliente</h2>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div class="bg-white rounded-3xl p-6 shadow-lg mb-8">
            <h1 class="text-center font-black text-slate-700 mb-4 uppercase text-sm">Consulta de Expediente</h1>
            <input type="text" id="userInput" placeholder="EXP-XXX o Pasaporte" 
                class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-center font-bold text-xl uppercase outline-none focus:border-blue-500 mb-4">
            <button onclick="buscarExpediente()" class="w-full bg-ejido text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                BUSCAR AHORA
            </button>
        </div>

        <div id="resultBox" class="hidden space-y-6">
            
            <div class="bg-ejido text-white p-6 rounded-3xl shadow-xl">
                <h3 id="clientName" class="text-2xl font-black uppercase"></h3>
                <p id="expDetail" class="text-blue-200 text-xs font-bold mt-1"></p>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-l-8 border-blue-500">
                <h4 class="font-black text-blue-900 text-sm mb-4 uppercase"><i class="fas fa-file-alt mr-2"></i> Documentación Inicial</h4>
                <div id="timelineDoc" class="space-y-4"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-l-8 border-green-500">
                <h4 class="font-black text-green-900 text-sm mb-4 uppercase"><i class="fas fa-shield-alt mr-2"></i> Estado de Antecedentes</h4>
                <div id="timelineAP" class="space-y-4"></div>
            </div>

            <div id="notasBox" class="p-5 bg-yellow-50 rounded-3xl border-2 border-yellow-100 text-sm italic text-slate-600"></div>
        </div>
    </div>

    <script>
        const MI_API_URL = "https://script.google.com/macros/s/AKfycbzS7dC1uPDbpI1e2HUVVTlrb5FxHpqXzZmKRGwMiQBHWgeluJ3AkOgSb2MuIB-FQkQ/exec";

        const ORDEN_AP = ["NO TIENE", "LO HA TRAIDO EL", "INCIDENCIA", "RECIBIDO", "TRAMITADO"];

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;
            try {
                const response = await fetch(MI_API_URL);
                const data = await response.json();
                const item = data.find(i => String(i.n_exp).toUpperCase() === val || String(i.pasaporte).toUpperCase() === val);
                if (item) { mostrarTodo(item); } else { alert("No encontrado"); }
            } catch (e) { alert("Error"); }
        }

        function mostrarTodo(item) {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('clientName').innerText = item.nombre;
            document.getElementById('expDetail').innerText = "EXPEDIENTE: " + item.n_exp;
            document.getElementById('notasBox').innerHTML = "<strong>Notas:</strong> " + (item.notas || "En revisión");

            // 1. Timeline de Documentación (Pasaporte, Contratos, Pago)
            const docContainer = document.getElementById('timelineDoc');
            const docs = [
                { lab: "Pasaporte", val: item.pasaporte, ok: item.pasaporte.toUpperCase() === "ESCANEADO" },
                { lab: "Contratos", val: item.contratos, ok: item.contratos.toUpperCase() === "TIENE" },
                { lab: "Pago de Tasa", val: item.pagado_ap, ok: item.pagado_ap.toUpperCase() === "PAGADO" }
            ];
            docContainer.innerHTML = docs.map(d => createStep(d.lab, d.val, d.ok)).join('');

            // 2. Timeline de Antecedentes (Los 5 pasos)
            const apContainer = document.getElementById('timelineAP');
            const estadoActual = item.estado_ap.toUpperCase();
            const indexActual = ORDEN_AP.indexOf(estadoActual);
            
            apContainer.innerHTML = ORDEN_AP.map((est, i) => {
                const isPast = i < indexActual;
                const isCurrent = i === indexActual;
                return `
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full z-10 flex items-center justify-center border-2 ${isCurrent ? 'bg-green-500 text-white shadow-lg' : (isPast ? 'bg-green-200 text-green-700' : 'bg-slate-100 text-slate-300')}">
                            <i class="fas ${isCurrent ? 'fa-arrow-right' : (isPast ? 'fa-check' : 'fa-circle')} text-[10px]"></i>
                        </div>
                        <span class="text-[10px] font-black uppercase ${isCurrent ? 'text-green-600 scale-105' : 'text-slate-400'}">${est}</span>
                    </div>
                `;
            }).join('');
        }

        function createStep(label, value, isOk) {
            return `
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center border-2 ${isOk ? 'bg-blue-500 text-white' : 'bg-red-50 text-red-300'}">
                        <i class="fas ${isOk ? 'fa-check' : 'fa-times'} text-[10px]"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-800 uppercase">${label}</p>
                        <p class="text-[9px] font-bold ${isOk ? 'text-blue-600' : 'text-red-400'} uppercase italic">${value}</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
