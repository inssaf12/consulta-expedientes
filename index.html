<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #020617 !important; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%) !important;
            color: #ffffff !important; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 30px; }
        .logo-text { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 0.4em; margin: 0; }
        .sub-text { font-size: 8px; letter-spacing: 0.5em; color: #60a5fa; text-transform: uppercase; margin-top: 8px; font-weight: bold; }

        .glass-card { 
            background-color: #1e293b !important; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        input {
            width: 100%; background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; border-radius: 12px;
            color: white; text-align: center; font-size: 16px;
            font-weight: bold; margin-bottom: 15px; box-sizing: border-box;
            text-transform: uppercase; outline: none;
        }

        button {
            width: 100%; background-color: #ffffff !important; color: #000000 !important;
            padding: 15px; border: none; border-radius: 12px;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; font-size: 11px;
        }

        #resultBox { width: 100%; max-width: 380px; display: none; }
        
        .client-info { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        
        /* التايملاين */
        .step { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #334155; flex-shrink: 0; margin-top: 3px; }
        .dot.active { background-color: #2563eb; border-color: #2563eb; box-shadow: 0 0 10px #2563eb; }
        .dot.past { background-color: #334155; }
        .step-text { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #475569; }
        .step-text.active { color: #ffffff; }
        .fecha { color: #60a5fa; font-size: 9px; display: block; margin-top: 2px; }

        /* الكروت ديال الوثائق (الجديد) */
        .doc-item {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03);
            padding: 12px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
        }
        .doc-icon {
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .status-ok { background: #ffffff; color: #000000; }
        .status-no { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .doc-info p { margin: 0; font-size: 11px; text-transform: uppercase; }
        .doc-label { font-size: 7px !important; color: #475569; font-weight: 900; letter-spacing: 1px; }

        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #25d366 !important; color: white !important; padding: 12px 20px;
            border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 10px;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <a href="https://wa.me/34621188515" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> CONTACTAR OFICINA
    </a>

    <header>
        <img src="Logo.png" alt="" style="height: 50px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto;">
        <h1 class="logo-text">LEXILIAS</h1>
        <p class="sub-text">Gestión Jurídica Profesional</p>
    </header>

    <div class="glass-card">
        <input type="text" id="userInput" placeholder="Nº EXP O PASAPORTE">
        <button onclick="buscarExpediente()">Consultar Estado</button>
    </div>

    <div id="resultBox">
        <div class="client-info">
            <span style="color: #60a5fa; font-size: 8px; font-weight: 900; letter-spacing: 2px;">EXPEDIENTE LOCALIZADO</span>
            <h2 id="cName" style="margin: 10px 0; font-size: 22px; font-weight: 900;"></h2>
            <p id="cExp" style="color: #475569; font-size: 9px; font-weight: bold;"></p>
        </div>

        <div class="glass-card">
            <p style="text-align: center; font-size: 8px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 20px; color: #64748b;">EVOLUCIÓN</p>
            <div id="timelineContent"></div>
        </div>

        <div class="glass-card">
            <p style="text-align: center; font-size: 8px; font-weight: 900; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 20px; color: #64748b;">DOCUMENTACIÓN</p>
            <div id="docsContent"></div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwySMAtY8mrP4RO47VHW3iBX9OHjTbozBc_zmmjXNNWMpJobGO9KrZu_ghGC5GRiFc/exec";
        const PASOS = ["NO TIENE", "LO HA TRAIDO EL", "RECIBIDO", "TRAMITADO"];

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;
            
            try {
                const res = await fetch(API);
                const data = await res.json();
                const item = data.find(i => (i.n_exp && String(i.n_exp).toUpperCase() === val) || (i.pasaporte && String(i.pasaporte).toUpperCase() === val));

                if (item) {
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('cName').innerText = item.nombre;
                    document.getElementById('cExp').innerText = "REG: " + item.n_exp;
                    
                    // التاريخ
                    let fText = "";
                    if (item.fecha_cad) {
                        const d = new Date(item.fecha_cad);
                        fText = !isNaN(d) ? d.toLocaleDateString('es-ES') : String(item.fecha_cad).split('T')[0];
                    }

                    // الحالة
                    const est = String(item.estado_ap || "").toUpperCase();
                    let idxAct = -1;
                    PASOS.forEach((p, idx) => { if(est.includes(p)) idxAct = idx; });

                    // رسم التايملاين
                    document.getElementById('timelineContent').innerHTML = PASOS.map((p, i) => {
                        const isA = i === idxAct; const isP = i < idxAct;
                        return `
                            <div class="step">
                                <div class="dot ${isA ? 'active' : (isP ? 'past' : '')}"></div>
                                <div class="step-text ${isA ? 'active' : ''}">
                                    ${p}
                                    ${(p === "LO HA TRAIDO EL" && (isA || isP)) ? `<span class="fecha">${fText}</span>` : ""}
                                </div>
                            </div>`;
                    }).join('');

                    // رسم الوثائق (الجديد)
                    const misDocs = [
                        { label: "Pasaporte", val: String(item.pasaporte || "").toUpperCase() },
                        { label: "Contratos", val: String(item.contratos || "").toUpperCase() },
                        { label: "Tasa Pago", val: String(item.pagado_ap || "").toUpperCase() }
                    ];

                    document.getElementById('docsContent').innerHTML = misDocs.map(d => {
                        const isOK = ["ESCANEADO", "PAGADO", "TIENE", "SI"].includes(d.val);
                        return `
                            <div class="doc-item">
                                <div class="doc-icon ${isOK ? 'status-ok' : 'status-no'}">
                                    <i class="fas ${isOK ? 'fa-check' : 'fa-times'}"></i>
                                </div>
                                <div class="doc-info">
                                    <p class="doc-label">${d.label}</p>
                                    <p style="font-weight: 900; color: ${isOK ? '#fff' : '#ef4444'}">${d.val || 'PENDIENTE'}</p>
                                </div>
                            </div>`;
                    }).join('');

                    if(est.includes("TRAMITADO")) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                } else { alert("No encontrado"); }
            } catch (e) { alert("Error"); }
        }
    </script>
</body>
</html>
