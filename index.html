<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Seguimiento</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #000000 100%); 
            color: #fff; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        .font-cinzel { font-family: 'Cinzel', serif; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem; 
        }

        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }
        
        .alert-critical { 
            animation: pulse-red 2s infinite; 
            background: rgba(220, 38, 38, 0.15); 
            border: 1.5px solid #ef4444 !important; 
        }

        .bg-confirm { 
            background: #ffffff !important; 
            color: #000000 !important; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); 
        }
        
        .bg-danger { 
            background: #ef4444 !important; 
            color: #ffffff !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); 
        }

        .whatsapp-lux { 
            position: fixed; bottom: 25px; right: 20px; 
            background: #25d366; color: white; padding: 12px 24px; 
            border-radius: 100px; z-index: 1000; text-decoration: none; 
            display: flex; align-items: center; gap: 10px; 
            font-weight: 900; font-size: 11px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .spinner { 
            display: none; 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top: 3px solid #fff; 
            border-radius: 50%; width: 20px; height: 20px; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <a href="https://wa.me/34621188515" class="whatsapp-lux" target="_blank">
        <i class="fab fa-whatsapp text-lg"></i><span>CONTACTAR CON OFICINA</span>
    </a>

    <header class="py-10 text-center">
        <h1 class="font-cinzel text-xl tracking-[0.3em]">LEXILIAS</h1>
        <p class="text-[7px] tracking-[0.4em] text-slate-500 uppercase mt-1 italic">Gestión Jurيدica Profesional</p>
    </header>

    <div class="max-w-md mx-auto px-6">
        <div class="glass-card p-8 mb-8 shadow-2xl">
            <input type="text" id="userInput" placeholder="Nº EXP O PASAPORTE" 
                   class="w-full px-4 py-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-white text-center text-lg outline-none uppercase focus:border-white/30 transition-all mb-4">
            <button onclick="buscarExpediente()" class="w-full bg-white text-black font-black py-5 rounded-2xl flex justify-center items-center gap-3 uppercase text-[10px] tracking-widest active:scale-95 transition-all">
                <span id="btnText">Consultar Estado</span>
                <div id="loader" class="spinner"></div>
            </button>
        </div>

        <div id="resultBox" class="hidden space-y-6">
            <div class="bg-black border border-white/10 rounded-[2.5rem] p-7 text-center">
                <span class="text-blue-400 text-[8px] font-black uppercase tracking-[0.3em]">Expediente Localizado</span>
                <h3 id="clientName" class="text-2xl font-black text-white uppercase italic mt-1"></h3>
                <p id="expDetail" class="text-slate-600 text-[9px] font-bold mt-2 tracking-widest"></p>
            </div>

            <div id="incidenciaAlert" class="hidden alert-critical p-7 rounded-[2.5rem] text-center">
                <i class="fas fa-exclamation-circle text-red-500 text-3xl mb-3"></i>
                <h4 class="text-red-500 font-black text-lg uppercase">¡Atención!</h4>
                <p class="text-white text-[11px] mt-2">Hay una incidencia en su trámite. Contacte con nosotros.</p>
            </div>

            <div id="timelineContainer" class="glass-card p-8">
                <h4 class="font-black text-white text-[9px] mb-10 uppercase tracking-[0.3em] border-b border-white/5 pb-4 text-center">Evolución del Trámite</h4>
                <div id="timelineAP" class="space-y-8 relative before:absolute before:left-[19px] before:top-2 before:bottom-2 before:w-[1px] before:bg-white/5"></div>
            </div>

            <div class="glass-card p-8">
                <h4 class="font-black text-white text-[9px] mb-8 uppercase tracking-[0.3em] border-b border-white/5 pb-4 text-center italic">Documentación Requerida</h4>
                <div id="docList" class="space-y-4"></div>
            </div>

            <div id="notasContainer" class="bg-white/5 border border-white/10 p-7 rounded-[2rem] text-center">
                <p class="text-[8px] font-black text-slate-500 uppercase mb-3 tracking-widest">Observaciones</p>
                <div id="notasText" class="text-xs text-slate-300 italic leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        const MI_API_URL = "https://script.google.com/macros/s/AKfycbwySMAtY8mrP4RO47VHW3iBX9OHjTbozBc_zmmjXNNWMpJobGO9KrZu_ghGC5GRiFc/exec";
        const PASOS_OK = ["NO TIENE", "LO HA TRAIDO EL", "RECIBIDO", "TRAMITADO"];

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;

            document.getElementById('btnText').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch(MI_API_URL);
                if (!response.ok) throw new Error('Error en red');
                const data = await response.json();
                
                const item = data.find(i => 
                    (i.n_exp && String(i.n_exp).trim().toUpperCase() === val) || 
                    (i.pasaporte && String(i.pasaporte).trim().toUpperCase() === val)
                );

                if (item) {
                    renderizar(item);
                } else {
                    alert("No se ha encontrado ningún expediente con: " + val);
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión. Asegúrate de tener internet.");
            } finally {
                document.getElementById('btnText').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderizar(item) {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('clientName').innerText = item.nombre;
            document.getElementById('expDetail').innerText = "REG: " + item.n_exp;
            document.getElementById('notasText').innerText = item.notas || "Proceso bajo supervisión legal.";

            const estadoRaw = String(item.estado_ap || "").trim().toUpperCase();
            
            const alertBox = document.getElementById('incidenciaAlert');
            const timelineBox = document.getElementById('timelineContainer');
            if(estadoRaw.includes("INCIDENCIA")) {
                alertBox.classList.remove('hidden');
                timelineBox.classList.add('hidden');
            } else {
                alertBox.classList.add('hidden');
                timelineBox.classList.remove('hidden');
            }

            // Timeline con Fecha
            let indexActual = -1;
            let fechaTramite = "";
            if (item.fecha_cad) {
    // هاد السطر كياخد أول 10 حروف فقط (يعني التاريخ بلا الوقت والزيادات)
               const d = new Date(item.fecha_cad);
               if (!isNaN(d)) {
              fechaTramite = d.toLocaleDateString('es-ES'); // كيرجع التاريخ بصيغة DD/MM/YYYY
               } else {
              fechaTramite = String(item.fecha_cad).split('T')[0]; // حل احتياطي
        }
    }

            PASOS_OK.forEach((p, idx) => {
                if(estadoRaw.includes(p)) indexActual = idx;
            });

            document.getElementById('timelineAP').innerHTML = PASOS_OK.map((paso, i) => {
                const esPasado = i < indexActual;
                const esActual = i === indexActual;
                let ball = esPasado ? "bg-white/10 text-white/30" : (esActual ? "bg-blue-600 shadow-[0_0_20px_#2563eb] scale-110" : "border-white/5 text-slate-800");
                let textStyle = esActual ? "text-white font-black" : "text-slate-600";
                
                let labelExtra = "";
                if (paso === "LO HA TRAIDO EL" && (esActual || esPasado) && fechaTramite) {
                    labelExtra = `<br><span class="text-[8px] text-blue-400 font-medium tracking-normal">${fechaTramite}</span>`;
                }

                return `
                    <div class="flex items-start gap-6 relative">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center z-10 border ${ball} transition-all mt-1">
                            ${esPasado ? '<i class="fas fa-check text-[8px]"></i>' : (esActual ? '<i class="fas fa-sync-alt fa-spin text-[10px]"></i>' : '')}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] uppercase tracking-widest ${textStyle}">${paso}</span>
                            ${labelExtra}
                        </div>
                    </div>`;
            }).join('');

            // Documentación
            const docs = [ 
                { t: "Pasaporte", v: String(item.pasaporte || "").trim().toUpperCase() }, 
                { t: "Contrato", v: String(item.contratos || "").trim().toUpperCase() }, 
                { t: "Tasa Pago", v: String(item.pagado_ap || "").trim().toUpperCase() } 
            ];

            document.getElementById('docList').innerHTML = docs.map(d => {
                const esOK = d.v === "ESCANEADO" || d.v === "PAGADO" || d.v === "TIENE";
                const esMal = d.v.includes("NO") || d.v === "FALTA";
                
                let iconClass = esOK ? "bg-confirm" : (esMal ? "bg-danger" : "bg-slate-800");
                let iconSymbol = esOK ? "fa-check" : (esMal ? "fa-times" : "fa-minus");
                let textCol = esOK ? "text-white" : (esMal ? "text-red-400 font-bold" : "text-slate-600");

                return `
                    <div class="flex items-center gap-5 p-4 rounded-2xl border border-white/5 bg-white/5">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${iconClass} transition-all">
                            <i class="fas ${iconSymbol} text-[11px]"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-[7px] text-slate-500 uppercase font-bold tracking-widest">${d.t}</p>
                            <p class="text-xs ${textCol} uppercase tracking-tighter">${d.v}</p>
                        </div>
                    </div>`;
            }).join('');

            if(estadoRaw === "TRAMITADO") {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            setTimeout(() => { window.scrollTo({ top: document.getElementById('resultBox').offsetTop - 20, behavior: 'smooth' }); }, 300);
        }
    </script>
</body>
</html>
