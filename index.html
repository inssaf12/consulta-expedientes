<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexilias Jurídicos | Seguimiento</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at top, #0f172a 0%, #000000 100%);
            color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }

        /* Encabezado solicitado */
        header { text-align: center; margin-bottom: 35px; }
        .logo-img { height: 110px; filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.3)); }
        .sub-text { font-size: 11px; letter-spacing: 0.3em; color: #60a5fa; text-transform: uppercase; font-weight: 900; margin-top: 10px; }

        .glass-card { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 25px; width: 100%; max-width: 420px; margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* WhatsApp Flotante */
        .whatsapp-btn {
            position: fixed; bottom: 25px; right: 25px;
            background-color: #25d366; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000;
            text-decoration: none; transition: 0.3s;
        }

        /* Filas de Estado */
        .status-row { 
            display: flex; align-items: center; gap: 15px; padding: 18px; 
            background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 12px;
            border-left: 7px solid #444;
        }
        .border-red { border-left-color: #ef4444 !important; }
        .border-green { border-left-color: #22c55e !important; }
        .bg-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .bg-green { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

        .nota-box {
            background: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444;
            padding: 15px; border-radius: 18px; margin-top: 15px;
        }

        input, button { width: 100%; padding: 18px; border-radius: 15px; margin-bottom: 15px; font-weight: 700; border: none; font-size: 15px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; text-align: center; }
        button { background: #ffffff; color: #000000; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <img src="Logo.png" alt="Lexilias" class="logo-img">
        <p class="sub-text">SERVICIO JURÍDICO EXTRANJERÍA</p>
    </header>

    <div class="glass-card" id="searchPanel">
        <p style="text-align:center; font-size: 12px; color: #94a3b8; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px;">CONSULTA DE EXPEDIENTE</p>
        <input type="text" id="userExp" placeholder="Nº DE EXPEDIENTE">
        <input type="text" id="userBirth" placeholder="FECHA NACIMIENTO (DD/MM/AAAA)" maxlength="10">
        <button onclick="buscarExpediente()">Consultar</button>
    </div>

    <div id="resultBox" style="display:none; width: 100%; max-width: 420px;">
        <div class="glass-card" style="text-align: center;">
            <h2 id="cName" style="font-weight: 900; text-transform: uppercase; font-size: 22px;"></h2>
            <p id="cExp" style="font-size: 12px; color: #94a3b8; font-weight: 700; margin-top: 5px;"></p>
        </div>

        <div class="glass-card">
            <div id="rowPenales" class="status-row">
                <div id="iconPenales" class="icon-box"><i class="fas fa-file-shield"></i></div>
                <div><p style="font-size: 10px; color: #94a3b8; font-weight: 900;">ESTADO A. PENALES</p><p id="txtPenales" style="font-weight: 900;"></p></div>
            </div>

            <div id="rowPago" class="status-row">
                <div id="iconPago" class="icon-box"><i class="fas fa-hand-holding-dollar"></i></div>
                <div><p style="font-size: 10px; color: #94a3b8; font-weight: 900;">PAGO DE SERVICIOS</p><p id="txtPago" style="font-weight: 900;"></p></div>
            </div>

            <div id="rowPasaporte" class="status-row">
                <div id="iconPasaporte" class="icon-box"><i class="fas fa-passport"></i></div>
                <div><p style="font-size: 10px; color: #94a3b8; font-weight: 900;">ESTADO DE PASAPORTE</p><p id="txtPasaporte" style="font-weight: 900;"></p></div>
            </div>

            <div id="boxNota" class="nota-box" style="display:none;">
                <p style="color: #ef4444; font-size: 11px; font-weight: 900; margin-bottom: 5px;">
                    <i class="fas fa-triangle-exclamation"></i> MENSAJE DE LEXILIAS:
                </p>
                <p id="txtNota" style="font-size: 14px; font-weight: 700; color: #cbd5e1;"></p>
            </div>
        </div>
        <button onclick="location.reload()" style="background:transparent; border:1px solid white; color:white;">Nueva Consulta</button>
    </div>

    <a href="https://wa.me/34600000000" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // Auto-formato de fecha
        document.getElementById('userBirth').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 2 && v.length <= 4) v = v.slice(0, 2) + '/' + v.slice(2);
            else if (v.length > 4) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4, 8);
            e.target.value = v;
        });

        const API = "https://script.google.com/macros/s/AKfycbwdnK9DUUJ9Sw_FSg75TJXla-KUkOqt_ZFhL_hTI5W-1Ei3R1viDilFCgee2iqkIoM/exec";

        async function buscarExpediente() {
            const expVal = document.getElementById('userExp').value.trim();
            const birthVal = document.getElementById('userBirth').value.trim();
            if(!expVal || !birthVal) return;

            try {
                const res = await fetch(API);
                const data = await res.json();
                const item = data.find(i => i.n_exp === expVal && i.fecha_nac === birthVal);

                if(item) {
                    document.getElementById('searchPanel').style.display = 'none';
                    document.getElementById('resultBox').style.display = 'block';
                    document.getElementById('cName').innerText = item.nombre;
                    document.getElementById('cExp').innerText = "REF: " + item.n_exp;

                    const update = (idRow, idIcon, idTxt, value, positive) => {
                        document.getElementById(idTxt).innerText = value.toUpperCase();
                        document.getElementById(idRow).className = "status-row " + (positive ? "border-green" : "border-red");
                        document.getElementById(idIcon).className = "icon-box " + (positive ? "bg-green" : "bg-red");
                    };

                    // Estado Penales (Rojo si hay Incidencia)
                    update('rowPenales', 'iconPenales', 'txtPenales', item.penales, !item.penales.toUpperCase().includes("INCIDENCIA"));
                    
                    // Pago de Servicios
                    update('rowPago', 'iconPago', 'txtPago', item.pago_servicios, item.pago_servicios.toUpperCase().includes("PAGADO"));
                    
                    // PASAPORTE (ROJO SI DICE "NO")
                    const pasVal = item.pasaporte_est.toUpperCase();
                    const esEscaneado = pasVal.includes("ESCANEADO") && !pasVal.includes("NO");
                    update('rowPasaporte', 'iconPasaporte', 'txtPasaporte', item.pasaporte_est, esEscaneado);

                    if(item.nota_cliente) {
                        document.getElementById('boxNota').style.display = 'block';
                        document.getElementById('txtNota').innerText = item.nota_cliente;
                    }
                    if(esEscaneado && item.pago_servicios.toUpperCase().includes("PAGADO")) confetti();
                } else { alert("Expediente no encontrado."); }
            } catch(e) { alert("Error de conexión."); }
        }
    </script>
</body>
</html>
