<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lexilias Jurídicos | Área Privada</title>
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #000000 100%); color: #fff; min-height: 100vh; margin: 0; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        
        /* أنيماسيون الخطر للـ Incidencia */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .alert-critical { animation: pulse-red 2s infinite; background: rgba(220, 38, 38, 0.2); border: 2px solid #ef4444 !important; }

        .bg-confirm { background: #ffffff !important; color: #000 !important; }
        .whatsapp-lux { position: fixed; bottom: 25px; right: 20px; background: #25d366; color: white; padding: 12px 24px; border-radius: 100px; z-index: 1000; display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body class="pb-32">

    <a href="https://wa.me/34621188515" class="whatsapp-lux" target="_blank">
        <i class="fab fa-whatsapp text-xl"></i><span>HABLAR CON LETRADO</span>
    </a>

    <header class="py-10 px-6 text-center">
        <img src="Logo.png" alt="Lexilias" class="h-20 mx-auto mb-4">
        <h1 class="font-cinzel text-xl tracking-[0.3em]">LEXILIAS</h1>
    </header>

    <div class="max-w-md mx-auto px-6">
        <div class="glass-card p-8 mb-8 shadow-2xl">
            <input type="text" id="userInput" placeholder="Nº EXP O PASAPORTE" class="w-full px-4 py-5 bg-white/5 border border-white/10 rounded-2xl font-bold text-white text-center text-lg outline-none uppercase focus:border-white/30 transition-all">
            <button onclick="buscarExpediente()" class="w-full bg-white text-black font-black py-5 rounded-2xl mt-4 uppercase text-xs tracking-widest active:scale-95 transition-all">Verificar Estado</button>
        </div>

        <div id="resultBox" class="hidden space-y-6">
            <div class="bg-black border border-white/10 rounded-[2.5rem] p-7 text-center">
                <span class="text-blue-400 text-[8px] font-black uppercase tracking-widest tracking-[0.3em]">Expediente Localizado</span>
                <h3 id="clientName" class="text-2xl font-black text-white uppercase italic mt-1"></h3>
            </div>

            <div id="incidenciaAlert" class="hidden alert-critical p-6 rounded-[2rem] text-center border-2">
                <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-3"></i>
                <h4 class="text-red-500 font-black text-lg uppercase">¡Atención: Incidencia!</h4>
                <p class="text-white text-xs mt-2 font-medium">Se ha detectado un problema en su trámite. Por favor, contacte con su abogado inmediatamente.</p>
            </div>

            <div id="timelineContainer" class="glass-card p-8">
                <h4 class="font-black text-white text-[10px] mb-8 uppercase tracking-[0.3em] border-b border-white/5 pb-4 text-center">Evolución del Trámite</h4>
                <div id="timelineAP" class="space-y-8 relative before:absolute before:left-[19px] before:top-2 before:bottom-2 before:w-[1px] before:bg-white/5"></div>
            </div>

            <div class="glass-card p-8">
                <h4 class="font-black text-white text-[10px] mb-6 uppercase tracking-[0.3em] border-b border-white/5 pb-4 text-center">Requisitos</h4>
                <div id="docList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const MI_API_URL = "https://script.google.com/macros/s/AKfycbzS7dC1uPDbpI1e2HUVVTlrb5FxHpqXzZmKRGwMiQBHWgeluJ3AkOgSb2MuIB-FQkQ/exec";
        // المسار المثالي بدون INCIDENCIA
        const PASOS_OK = ["NO TIENE", "LO HA TRAIDO EL", "RECIBIDO", "TRAMITADO"];

        async function buscarExpediente() {
            const val = document.getElementById('userInput').value.trim().toUpperCase();
            if(!val) return;
            const response = await fetch(MI_API_URL);
            const data = await response.json();
            const item = data.find(i => String(i.n_exp).trim().toUpperCase() === val || String(i.pasaporte).trim().toUpperCase() === val);
            if (item) renderizar(item); else alert("No encontrado");
        }

        function renderizar(item) {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('clientName').innerText = item.nombre;
            
            const estado = String(item.estado_ap).trim().toUpperCase();
            const alertBox = document.getElementById('incidenciaAlert');
            const timelineBox = document.getElementById('timelineContainer');

            // منطق "INCIDENCIA" الذكي
            if(estado === "INCIDENCIA") {
                alertBox.classList.remove('hidden');
                timelineBox.classList.add('opacity-40'); // نخليو الشريط باهت حيت كاين مشكل
            } else {
                alertBox.classList.add('hidden');
                timelineBox.classList.remove('opacity-40');
            }

            // رسم الـ Timeline
            let indexActual = PASOS_OK.indexOf(estado);
            // إيلا كان فـ Incidencia، غانعتبروه فالمرحلة اللي كان فيها قبل
            if(estado === "INCIDENCIA") indexActual = 1; 

            document.getElementById('timelineAP').innerHTML = PASOS_OK.map((paso, i) => {
                const esPasado = i < indexActual;
                const esActual = i === indexActual && estado !== "INCIDENCIA";
                
                let ball = esPasado ? "bg-white/20 text-white/40" : (esActual ? "bg-blue-600 shadow-[0_0_15px_#2563eb] scale-110" : "border-white/5 text-slate-800");
                let text = esActual ? "text-white font-black" : "text-slate-600";
                
                return `
                    <div class="flex items-center gap-6 relative">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center z-10 border ${ball} transition-all">
                            ${esPasado ? '<i class="fas fa-check text-[8px]"></i>' : (esActual ? '<i class="fas fa-sync-alt fa-spin text-[10px]"></i>' : '')}
                        </div>
                        <span class="text-[10px] uppercase tracking-widest ${text}">${paso}</span>
                    </div>`;
            }).join('');

            // قسم الوثائق
            const docs = [ {t:"Pasaporte", v:item.pasaporte}, {t:"Contrato", v:item.contratos}, {t:"Tasa", v:item.pagado_ap} ];
            document.getElementById('docList').innerHTML = docs.map(d => {
                const ok = d.v.toUpperCase().includes("TIENE") || d.v.toUpperCase().includes("ESCAN") || d.v.toUpperCase().includes("PAGADO");
                return `
                    <div class="flex items-center gap-4 p-3 rounded-xl ${ok ? 'bg-white/5' : 'bg-red-500/10 border border-red-500/20'}">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center ${ok ? 'bg-confirm' : 'bg-red-500 text-white'}">
                            <i class="fas ${ok ? 'fa-check' : 'fa-exclamation'} text-[8px]"></i>
                        </div>
                        <div class="flex-1">
                            <p class="text-[7px] text-slate-500 uppercase">${d.t}</p>
                            <p class="text-xs ${ok ? 'text-white' : 'text-red-400 font-bold'} uppercase">${d.v}</p>
                        </div>
                    </div>`;
            }).join('');
        }
    </script>
</body>
</html>
